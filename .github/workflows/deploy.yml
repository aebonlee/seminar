name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS }}
        run: npm run build

      # SPA fallback: 새로고침/딥링크 시 404.html 이 index.html 역할 대체
      - name: Copy index.html as 404.html (SPA fallback)
        run: cp dist/index.html dist/404.html || true

      # CNAME 자동 포함 (public/CNAME 이 이미 dist 로 복사됨)
      - name: Ensure CNAME
        run: |
          if [ ! -f dist/CNAME ]; then
            echo "seminar.dreamitbiz.com" > dist/CNAME
          fi
          cat dist/CNAME

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          cname: seminar.dreamitbiz.com
          # 빌드마다 옛 파일 다 비우고 새로 올림
          force_orphan: true
          commit_message: "deploy: ${{ github.sha }}"
