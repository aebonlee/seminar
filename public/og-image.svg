<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="60%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- 상단 좌측 브랜드 -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#3b82f6"/>
    <path d="M14 13 L14 33 L22 33 C28 33 31 30 31 23 C31 16 28 13 22 13 Z" fill="#ffffff"/>
    <text x="60" y="30" font-family="'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="22" font-weight="800" fill="#60a5fa" letter-spacing="3">DREAMIT · SEMINAR</text>
  </g>

  <!-- 메인 타이틀 -->
  <g transform="translate(80, 270)">
    <text x="0" y="0" font-family="'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="68" font-weight="800" fill="#f8fafc" letter-spacing="-2">엄선된 강의로,</text>
    <text x="0" y="78" font-family="'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="68" font-weight="800" fill="#f8fafc" letter-spacing="-2">다음 챕터를 준비하세요</text>
  </g>

  <!-- 서브타이틀 -->
  <text x="80" y="482" font-family="'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="400" fill="#cbd5e1">관리자 큐레이션을 거친 프리미엄 세미나 플랫폼</text>

  <!-- 하단 우측 URL -->
  <g transform="translate(1120, 570)" text-anchor="end">
    <text x="0" y="0" font-family="'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="22" font-weight="700" fill="#60a5fa" letter-spacing="2">seminar.dreamitbiz.com</text>
  </g>

  <!-- 하단 좌측 데코 라인 -->
  <line x1="80" y1="570" x2="220" y2="570" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
</svg>